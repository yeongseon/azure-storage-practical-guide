site_name: Azure Storage Practical Guide
site_url: https://yeongseon.github.io/azure-storage-practical-guide/
site_description: Azure Storage practical guide — data access, durability, operations, and troubleshooting grounded in MS Learn
site_author: yeongseon

repo_name: yeongseon/azure-storage-practical-guide
repo_url: https://github.com/yeongseon/azure-storage-practical-guide

theme:
  name: material
  language: en
  custom_dir: docs
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-zoom.js

plugins:
  - search
  - minify:
      minify_html: true

validation:
  nav:
    omitted_files: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here:
    - start-here/index.md
    - Overview: start-here/overview.md
    - Learning Path: start-here/learning-path.md
    - Storage Services at a Glance: start-here/storage-services-at-a-glance.md
    - Common Scenarios: start-here/common-scenarios.md
  - Platform:
    - platform/index.md
    - How Azure Storage Works: platform/how-azure-storage-works.md
    - Storage Account Basics: platform/storage-account-basics.md
    - Blob Storage Basics: platform/blob-storage-basics.md
    - File Storage Basics: platform/file-storage-basics.md
    - Queue and Table Basics: platform/queue-and-table-basics.md
    - Redundancy and Durability: platform/redundancy-and-durability.md
    - Access Models: platform/access-models.md
    - Networking and Private Access: platform/networking-and-private-access.md
    - Performance and Scaling Basics: platform/performance-and-scaling-basics.md
  - Best Practices:
